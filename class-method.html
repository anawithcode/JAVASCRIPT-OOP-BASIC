<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Method</title>
</head>
<body>
<script>

    class Person {
        constructor(name){
            this.name = name;
        }

        sayHello(name){
            console.info(`Hello ${name}, my name is ${this,name}`)
        }
    }

    const ana = new Person("Ana");
    console.info(ana)
    ana.sayHello("Entun");

    const fathon = new Person("Ana");
    console.info(fathon)
    fathon.sayHello("Fathon");
</script> 
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Method</title>
</head>
<body>
<script>
    // Jujur bedanya static dan non static itu cuman
/*  - Static : dia pake 'static' dan tidak membutuhkan new dan this
    Pemanggilan : NamaClass.namaMethod()
    Tujuan      : Fungsi umum (seperti kalkulator).

    - Non static : Sebalikanya dia membutuhkan new dan this tapi tidak membutuhkan static
    Pemanggilan : const obj = new NamaClass(); obj.namaMethod()                              // perlu instanced object
    Tujuan      : kalkulator).	Fungsi yang memproses data objek (seperti profil user).
*/

    class MathUtil {

        static sum(...numbers){
            let total = 0;
            for(const number of numbers){
                total += number;
            }
            return total;
        }
    }

    const result = MathUtil.sum(1, 1, 1, 1, 1,);
    console.info(result);
</script>
</body>
</html>

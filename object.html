<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><Object></Object></title>
</head>
<body>
<script>

    //Property di Constructor Function
    function Person(){
        this.firstName = "Fathan";
        this.lastName = "Andriyano";
        this.sayHello = function (name) { //Method di Constructur Function
            console.info(`Hello ${name}, my name is ${this.firstName}`) 
        }
    }

    const ana = new Person();
    ana.firstName = "Shiva";

    const otan = new Person();
    otan.sayHello("Saba")

    console.log(ana);
    console.log(otan)


</script>
</body>
